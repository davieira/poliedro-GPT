services:
  - type: web
    name: poliedro-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn poliedro_mcp.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: OAUTH_CLIENT_ID
        value: poliedro-gpt
      - key: OAUTH_CLIENT_SECRET
        generateValue: true
      - key: API_BASE_URL
        value: https://poliedro-api.iden.is
      - key: API_KEY
        sync: false
      - key: POLIEDRO_TOKEN
        sync: false
      - key: POLIEDRO_CONFIG_JSON
        sync: false
